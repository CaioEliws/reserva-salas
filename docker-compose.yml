version: "3.9"

services:
  db:
    image: postgres:16
    container_name: reserva_postgres
    environment:
      POSTGRES_DB: reserva_salas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reserva-network

  app:
    build: .
    container_name: reserva_app
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reserva_salas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - reserva-network

volumes:
  postgres_data:

networks:
  reserva-network:
    driver: bridge